
services:
    backend:
        build:
            context: .
            dockerfile: Dockerfile.api
        ports:
            - "8000:8000"
        environment:
            - LLM_PROVIDER=groq
            - GROQ_API_KEY=${GROQ_API_KEY}
    frontend:
        build:
            context: .
            dockerfile: Dockerfile.app
        ports:
            - "8501:8501"
        environment:
            - BACKEND_URL=http://backend:8000
        depends_on:
            - backend
            
        